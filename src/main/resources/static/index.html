<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Dev Assistant</title>

    <style>

        body{
            font-family: Arial;
            margin:40px;
            background:#f5f5f5;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        h1{
            text-align:center;
        }

        .section{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
        }

        textarea{
            width:100%;
            height:120px;
        }

        input{
            width:100%;
            height:35px;
        }

        button{
            margin-top:10px;
            padding:8px 16px;
        }

        pre{
            background:#111;
            color:#00ff9c;
            padding:10px;
            white-space:pre-wrap;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>AI Dev Assistant</h1>

    <!-- AI聊天 -->

    <div class="section">

        <h2>AI问答</h2>

        <input id="chatInput" placeholder="输入问题">

        <button onclick="chat()">发送</button>

        <pre id="chatResult"></pre>

    </div>

    <!-- 代码Review -->

    <div class="section">

        <h2>代码Review</h2>

        <textarea id="codeInput" placeholder="输入Java代码"></textarea>

        <button onclick="review()">分析</button>

        <pre id="reviewResult"></pre>

    </div>

    <!-- 生成Entity -->

    <div class="section">

        <h2>生成Java Entity</h2>

        <input id="entityInput" placeholder="例如：用户表 id Long name String age Integer">

        <button onclick="generate()">生成</button>

        <pre id="entityResult"></pre>

    </div>

</div>

<script>

    const baseUrl = "http://localhost:8081";


    // AI聊天（流式）

    function chat(){

        let msg = document.getElementById("chatInput").value;

        let result = document.getElementById("chatResult");

        result.innerText="";

        const eventSource = new EventSource(baseUrl + "/day3/stream-chat?message=" + encodeURIComponent(msg));

        eventSource.onmessage = function(event){

            result.innerText += event.data;

        };

    }


    // 代码Review

    async function review(){

        let code = document.getElementById("codeInput").value;

        let res = await fetch(baseUrl + "/day1/review",{
            method:"POST",
            headers:{
                "Content-Type":"text/plain"
            },
            body:code
        });

        let json = await res.json();

        document.getElementById("reviewResult").innerText =
            JSON.stringify(json,null,2);

    }


    // 生成Entity（流式）

    function generate(){

        let desc = document.getElementById("entityInput").value;

        let result = document.getElementById("entityResult");

        result.innerText="";

        const eventSource = new EventSource(
            baseUrl + "/day4/generate-entity?tableDesc=" + encodeURIComponent(desc)
        );

        eventSource.onmessage = function(event){

            result.innerText += event.data;

        };

    }

</script>

</body>
</html>
