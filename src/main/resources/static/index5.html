<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI Java代码生成器</title>

  <style>

    body{
      font-family: Arial;
      background:#f5f6fa;
      padding:40px;
    }

    .container{
      width:900px;
      margin:auto;
    }

    h1{
      text-align:center;
    }

    textarea{
      width:100%;
      height:180px;
      padding:10px;
      font-size:14px;
    }

    button{
      padding:10px 20px;
      margin-top:10px;
      margin-right:10px;
      font-size:14px;
      cursor:pointer;
    }

    #result{
      margin-top:20px;
      background:black;
      color:#00ff88;
      padding:20px;
      white-space:pre-wrap;
      min-height:300px;
      overflow:auto;
    }

    .top-bar{
      margin-top:10px;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>AI Java代码生成器</h1>

  <p>请输入表结构 SQL：</p>

  <textarea id="sql">
CREATE TABLE user (
  id BIGINT PRIMARY KEY COMMENT '用户ID',
  name VARCHAR(50) COMMENT '姓名',
  email VARCHAR(100) COMMENT '邮箱',
  age INT COMMENT '年龄'
);
</textarea>

  <div class="top-bar">

    <button onclick="generateEntity()">生成Entity</button>

    <button onclick="generateCrud()">生成CRUD</button>

    <button onclick="copyCode()">复制代码</button>

    <button onclick="clearResult()">清空</button>

  </div>

  <pre id="result"></pre>

</div>


<script>

  let buffer = "";

  function generateCrud(){

    const sql = document.getElementById("sql").value;

    const result = document.getElementById("result");

    result.innerHTML = "";

    buffer = "";

    const url = "http://localhost:8081/day5/generate-crud?tableDesc=" + encodeURIComponent(sql);

    const eventSource = new EventSource(url);

    eventSource.onmessage = function(event){

      buffer += event.data;

      renderFiles();

    };

  }

  function renderFiles(){

    const result = document.getElementById("result");

    const parts = buffer.split("===");

    result.innerHTML = "";

    for(let i=1;i<parts.length;i+=2){

      const fileName = parts[i].trim();

      const code = parts[i+1] || "";

      const div = document.createElement("div");

      div.style.border="1px solid #ddd";
      div.style.marginBottom="20px";
      div.style.background="white";

      const header = document.createElement("div");

      header.style.background="#eee";
      header.style.padding="10px";

      const btn = document.createElement("button");

      btn.innerText="复制";

      btn.onclick = function(){

        navigator.clipboard.writeText(code);

        alert("已复制 "+fileName);

      }

      header.innerHTML="<b>"+fileName+"</b> ";

      header.appendChild(btn);

      const pre = document.createElement("pre");

      pre.style.padding="10px";

      pre.textContent=code;

      div.appendChild(header);

      div.appendChild(pre);

      result.appendChild(div);

    }

  }

</script>


</body>
</html>
